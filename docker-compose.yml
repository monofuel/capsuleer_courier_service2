services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app/web

  sui-dev:
    build:
      context: ./docker/sui-dev
    stdin_open: true
    tty: true
    ports:
      - "9000:9000"
    volumes:
      - sui-config:/root/.sui
      - .:/workspace
      - ../world-contracts:/workspace/world-contracts

volumes:
  sui-config:
